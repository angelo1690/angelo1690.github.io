<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Día de la Mujer</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* FONDO */
body {
  background: url("fondo.jpg") no-repeat center center / cover;
}

/* TARJETA */
#card {
  position: absolute;
  inset: 0;
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

/* TEXTO */
h1 {
  position: absolute;
  top: 12%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 2.6em;
  color: #f7c6ff;
  text-align: center;
  text-shadow:
    0 0 8px #ff66ff,
    0 0 18px #cc33ff,
    2px 2px 10px black;
  z-index: 10;
  transition: 0.5s;
}

/* BRILLO CUANDO SUENA LA MÚSICA */
.glow {
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from {
    text-shadow:
      0 0 10px #ff66ff,
      0 0 20px #cc33ff,
      0 0 30px #9933ff;
  }
  to {
    text-shadow:
      0 0 20px #ff99ff,
      0 0 35px #cc66ff,
      0 0 50px #9933ff;
  }
}

/* BOTÓN */
#play-btn {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 16px 38px;
  font-size: 1.2em;
  font-weight: bold;
  color: white;
  background: linear-gradient(135deg,#b84dff,#ff66cc);
  border: none;
  border-radius: 14px;
  cursor: pointer;
  box-shadow: 0 6px 15px rgba(0,0,0,0.6);
  z-index: 20;
}

/* PÉTALOS */
#petals {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

.petal {
  position: absolute;
  top: -80px;
  width: 40px;
  height: 40px;
  background: radial-gradient(circle,#ff99ff,#cc33ff);
  border-radius: 50% 50% 50% 0;
  transform: rotate(45deg);
  opacity: 0.8;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
    opacity: 0;
  }
}

/* YOUTUBE OCULTO */
iframe {
  position: absolute;
  width: 1px;
  height: 1px;
  left: -9999px;
}
</style>
</head>

<body>

<div id="card">
  <h1 id="text"></h1>
  <button id="play-btn">🎵 Reproducir canción</button>
</div>

<div id="petals"></div>

<iframe id="player" allow="autoplay"></iframe>

<script>

/* TEXTO LETRA POR LETRA */
const message = "Feliz día de la mujer, Guadalupe";
const textEl = document.getElementById("text");
let i = 0;

function typeText() {
  if (i < message.length) {
    textEl.textContent += message.charAt(i);
    i++;
    setTimeout(typeText, 90);
  }
}
typeText();

/* MÚSICA */
const btn = document.getElementById("play-btn");
const player = document.getElementById("player");

btn.addEventListener("click", () => {
  player.src =
  "https://www.youtube.com/embed/OukQDrJ7QRQ?autoplay=1&loop=1&playlist=OukQDrJ7QRQ";

  btn.style.display = "none";
  textEl.classList.add("glow");
});

/* PÉTALOS ROSADOS */
function createPetal() {
  const p = document.createElement("div");
  p.className = "petal";
  p.style.left = Math.random() * window.innerWidth + "px";
  p.style.animationDuration = (Math.random() * 5 + 6) + "s";
  document.getElementById("petals").appendChild(p);
  setTimeout(() => p.remove(), 12000);
}

setInterval(createPetal, 700);

</script>

</body>
</html>
